# This is a Databricks asset bundle definition for bakehouse_analytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehouse_analytics
  uuid: fdb64549-999a-47c8-ad2a-602a2abcd266

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    # mode: development
    presets:
      name_prefix: dev_
    default: true
    workspace:
      host: https://dbc-92d7d1f9-922d.cloud.databricks.com
    variables:
      catalog: bakehouse_analytics_dev
      schema: rnd

  prod:
    mode: production
    presets:
      name_prefix: prod_    
    workspace:
      host: https://dbc-92d7d1f9-922d.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/santoshyandhe@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/santoshyandhe@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse_analytics_prod
      schema: rnd
    permissions:
      - user_name: santoshyandhe@gmail.com
        level: CAN_MANAGE
